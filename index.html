<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visor 3D</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<model-viewer
  id="visor"
  camera-controls
  auto-rotate
  background-color="#111">
</model-viewer>

<script>
  const visor = document.getElementById("visor");

  const params = new URLSearchParams(window.location.search);
  let modelo = params.get("modelo");

  const baseURL = "https://cristianplaka.github.io/Visor3D/modelos/";

  if (modelo) {
    modelo = decodeURIComponent(modelo);
    modelo = modelo.replace("modelos/", "");
    visor.setAttribute("src", baseURL + modelo);
  } else {
    visor.setAttribute("src", baseURL + "Espada.glb");
  }
</script>

</body>
</html>
